<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조직 성과 체크인 시스템 - 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f0f4f8;color:#1a2332;min-height:100vh;}
:root{--primary:#1e3a5f;--secondary:#2d6a9f;--accent:#3b82f6;--green:#22c55e;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;}

.header{background:var(--primary);color:white;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.header-title{font-size:17px;font-weight:700;}
.header-title span{color:#93c5fd;margin-left:8px;font-size:13px;font-weight:400;}
.header-right{display:flex;align-items:center;gap:10px;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#64748b;display:inline-block;margin-right:4px;}
.conn-dot.ok{background:var(--green);}
.conn-dot.err{background:var(--red);}
.conn-label{font-size:12px;color:#93c5fd;}
.link-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;}
.link-btn:hover{background:rgba(255,255,255,.25);}

.nav{background:white;border-bottom:2px solid #e2e8f0;padding:0 32px;display:flex;}
.nav-btn{padding:14px 24px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:#64748b;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;}
.nav-btn.active{color:var(--primary);border-bottom-color:var(--accent);}

.section{display:none;padding:28px 32px;max-width:1200px;margin:0 auto;}
.section.active{display:block;}
.card{background:white;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:20px;}
.card-title{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:16px;}

/* Summary */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.summary-card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid var(--accent);}
.summary-card.green{border-left-color:var(--green);}
.summary-card.orange{border-left-color:var(--orange);}
.summary-card.red{border-left-color:var(--red);}
.summary-num{font-size:32px;font-weight:800;color:var(--primary);}
.summary-label{font-size:12px;color:#64748b;margin-top:6px;}

/* Form */
select,input[type=text],textarea{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;font-family:inherit;background:white;color:#1a2332;outline:none;transition:border-color .2s;}
select:focus,input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.1);}
label{font-size:13px;font-weight:600;color:#374151;display:block;margin-bottom:6px;}

/* Btn */
.btn{padding:11px 24px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{background:#162d4a;}
.btn-success{background:var(--green);color:white;}
.btn-success:hover{background:#16a34a;}
.btn-outline{background:white;color:var(--primary);border:2px solid var(--primary);}
.btn-outline:hover{background:#f0f4ff;}
.btn-danger{background:var(--red);color:white;}
.btn-sm{padding:7px 14px;font-size:12px;}

/* Admin round list */
.round-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:10px;}
.round-item .r-info .r-name{font-size:14px;font-weight:700;color:var(--primary);}
.round-item .r-info .r-period{font-size:12px;color:#64748b;margin-top:2px;}
.round-actions{display:flex;gap:8px;align-items:center;}
.toggle-btn{font-size:11px;font-weight:700;padding:4px 10px;border-radius:12px;border:none;cursor:pointer;}
.toggle-btn.on{background:#dcfce7;color:#16a34a;}
.toggle-btn.off{background:#fee2e2;color:#dc2626;}
.add-form{background:#f8fafc;border-radius:10px;padding:16px;margin-top:16px;border:1px dashed #cbd5e1;}
.add-form h4{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:12px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;}

/* Dashboard */
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.progress-bar-bg{flex:1;height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:var(--accent);transition:width .6s;}
.progress-pct{font-size:12px;font-weight:700;color:var(--secondary);min-width:34px;text-align:right;}
.progress-label{font-size:12px;color:#374151;font-weight:600;min-width:130px;}
.team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.team-card{background:white;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.07);cursor:pointer;transition:all .2s;border:2px solid transparent;}
.team-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.team-card.done{border-left:4px solid var(--green);}
.team-card.pending{border-left:4px solid #e2e8f0;}
.team-card-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.team-card-bunbu{font-size:11px;color:#64748b;}
.team-card-status{margin-top:10px;display:flex;align-items:center;}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;}
.sdot.g{background:var(--green);}
.sdot.gr{background:#cbd5e1;}
.status-text{font-size:12px;font-weight:600;}
.issue-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.issue-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;}
.tag-목표조정{background:#fef3c7;color:#92400e;}
.tag-신규목표{background:#d1fae5;color:#065f46;}
.tag-목표폐기{background:#fee2e2;color:#991b1b;}
.tag-지원요청{background:#e0e7ff;color:#3730a3;}
.tag-기타{background:#f1f5f9;color:#475569;}
.issue-summary{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px;}
.issue-box{background:white;border-radius:10px;padding:14px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.issue-box-num{font-size:24px;font-weight:800;color:var(--primary);}
.issue-box-label{font-size:11px;color:#64748b;margin-top:4px;}
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar select{width:auto;min-width:150px;}
.filter-bar label{margin:0;white-space:nowrap;}

/* Notices */
.notice{padding:12px 16px;border-radius:8px;font-size:13px;margin-bottom:14px;}
.notice.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:16px;width:90%;max-width:680px;max-height:88vh;overflow-y:auto;padding:28px;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--primary);}
.modal-close{font-size:22px;cursor:pointer;color:#64748b;border:none;background:none;}

/* OKR detail modal */
.okr-dr{border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:10px;}
.okr-dh{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.okr-obj{font-size:13px;font-weight:700;color:var(--primary);margin-bottom:3px;}
.okr-kr{font-size:12px;color:#374151;}
.okr-krd{font-size:12px;color:#64748b;}
.okr-cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;padding-top:10px;border-top:1px dashed #e2e8f0;}
.di span{font-size:11px;font-weight:700;color:#64748b;display:block;margin-bottom:2px;}
.di .dv{font-size:13px;color:#1a2332;}
.okr-num{font-size:11px;font-weight:800;color:white;background:var(--secondary);border-radius:6px;padding:3px 9px;white-space:nowrap;}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:12px;white-space:nowrap;}
.badge.q{background:#dbeafe;color:#1d4ed8;}
.badge.s{background:#f3e8ff;color:#7c3aed;}

/* Loading */
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.7);z-index:300;display:flex;align-items:center;justify-content:center;display:none;}
.spinner{width:40px;height:40px;border:4px solid #e2e8f0;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-overlay.show{display:flex;}

/* Toast */
.toast{position:fixed;bottom:32px;right:32px;background:#1a2332;color:white;padding:14px 22px;border-radius:10px;font-size:14px;font-weight:600;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{background:#16a34a;}
.toast.error{background:var(--red);}

.empty-state{text-align:center;padding:48px 20px;color:#94a3b8;}
.empty-icon{font-size:48px;margin-bottom:12px;}

/* Auth overlay */
.auth-overlay{position:fixed;inset:0;background:rgba(15,23,42,.85);z-index:500;display:flex;align-items:center;justify-content:center;}
.auth-box{background:white;border-radius:20px;padding:36px;width:90%;max-width:400px;text-align:center;}
.auth-box h2{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:8px;}
.auth-box p{font-size:14px;color:#64748b;margin-bottom:24px;}
.auth-input-row{display:flex;gap:8px;}
.auth-input-row input{flex:1;}

@media(max-width:768px){
  .summary-grid{grid-template-columns:repeat(2,1fr);}
  .team-grid{grid-template-columns:repeat(2,1fr);}
  .form-row{grid-template-columns:1fr;}
  .section{padding:16px;}
  .issue-summary{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<!-- 비밀번호 인증 -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>🔒 관리자 인증</h2>
    <p>관리자 비밀번호를 입력해주세요.</p>
    <div class="auth-input-row">
      <input type="password" id="authPwInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')checkAuth()">
      <button class="btn btn-primary" onclick="checkAuth()">확인</button>
    </div>
    <div id="authError" style="font-size:12px;color:var(--red);margin-top:8px;display:none"></div>
  </div>
</div>

<!-- Header -->
<div class="header">
  <div class="header-title">📊 조직 성과 체크인 시스템 <span>관리자</span></div>
  <div class="header-right">
    <div><span class="conn-dot" id="connDot"></span><span class="conn-label" id="connLabel">연결 확인 중...</span></div>
    <a class="link-btn" href="index.html?admin=true">📋 임직원 페이지</a>
  </div>
</div>

<div class="nav">
  <button class="nav-btn active" onclick="showSection('rounds',this)">📅 회차 관리</button>
  <button class="nav-btn" onclick="showSection('dashboard',this)">📈 대시보드</button>
  <button class="nav-btn" onclick="showSection('settings',this)">⚙️ 설정</button>
</div>

<!-- ===== ROUNDS MANAGEMENT ===== -->
<div class="section active" id="section-rounds">
  <div class="card">
    <div class="card-title">📅 체크인 회차 관리</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:14px">회차를 생성하고 활성화하면 팀장들의 입력 화면에 표시됩니다.</div>
    <div id="roundList"></div>
    <div class="add-form">
      <h4>➕ 새 회차 추가</h4>
      <div class="form-row">
        <div><label>회차명 <span style="color:var(--red)">*</span></label>
          <input type="text" id="newName" placeholder="예: 2026년 4월 체크인"></div>
        <div><label>기간/설명</label>
          <input type="text" id="newPeriod" placeholder="예: 1차 체크인 · 상반기 중간점검"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="doAddRound(false)">비활성으로 추가</button>
        <button class="btn btn-success btn-sm" onclick="doAddRound(true)">✅ 활성으로 즉시 추가</button>
      </div>
    </div>
  </div>
</div>

<!-- ===== DASHBOARD ===== -->
<div class="section" id="section-dashboard">
  <div class="filter-bar">
    <label>회차:</label>
    <select id="dashRound" onchange="renderDashboard()">
      <option value="">-- 회차 선택 --</option>
    </select>
    <label style="margin-left:8px">본부:</label>
    <select id="dashBunbu" onchange="renderDashboard()">
      <option value="">전체 본부</option>
    </select>
    <button class="btn btn-outline btn-sm" onclick="refreshDashboard()">🔄 새로고침</button>
  </div>

  <div class="summary-grid">
    <div class="summary-card"><div class="summary-num" id="dTotal">-</div><div class="summary-label">전체 팀 수</div></div>
    <div class="summary-card green"><div class="summary-num" id="dDone">-</div><div class="summary-label">체크인 완료</div></div>
    <div class="summary-card orange"><div class="summary-num" id="dPending">-</div><div class="summary-label">체크인 미완료</div></div>
    <div class="summary-card red"><div class="summary-num" id="dIssue">-</div><div class="summary-label">이슈 있는 팀</div></div>
  </div>

  <div class="card">
    <div class="card-title">⚠️ 이슈 현황</div>
    <div class="issue-summary">
      <div class="issue-box"><div class="issue-box-num" id="ic1">-</div><div class="issue-box-label">목표조정</div></div>
      <div class="issue-box"><div class="issue-box-num" id="ic2">-</div><div class="issue-box-label">신규목표</div></div>
      <div class="issue-box"><div class="issue-box-num" id="ic3">-</div><div class="issue-box-label">목표폐기</div></div>
      <div class="issue-box"><div class="issue-box-num" id="ic4">-</div><div class="issue-box-label">지원요청</div></div>
      <div class="issue-box"><div class="issue-box-num" id="ic5">-</div><div class="issue-box-label">기타</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏢 본부별 체크인 현황</div>
    <div id="bunbuProgress"></div>
  </div>

  <div class="card">
    <div class="card-title">👥 팀별 체크인 현황</div>
    <div class="team-grid" id="teamGrid"></div>
  </div>
</div>

<!-- ===== SETTINGS ===== -->
<div class="section" id="section-settings">
  <div class="card">
    <div class="card-title">🔑 관리자 비밀번호 변경</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:16px">관리자 페이지 접근 비밀번호를 변경합니다.</div>
    <div class="form-row">
      <div><label>현재 비밀번호</label><input type="password" id="oldPw" placeholder="현재 비밀번호"></div>
      <div><label>새 비밀번호</label><input type="password" id="newPw" placeholder="새 비밀번호"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="changePassword()">비밀번호 변경</button>
  </div>
</div>

<!-- 팀 상세 Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

function changePassword() {
  const oldPw = document.getElementById('oldPw').value;
  const newPw = document.getElementById('newPw').value;
  if (oldPw !== getAdminPw()) { showToast('현재 비밀번호가 올바르지 않습니다.', 'error'); return; }
  if (!newPw || newPw.length < 4) { showToast('새 비밀번호를 4자 이상 입력해주세요.', 'error'); return; }
  localStorage.setItem(ADMIN_PW_KEY, newPw);
  document.getElementById('oldPw').value = '';
  document.getElementById('newPw').value = '';
  showToast('비밀번호가 변경되었습니다.', 'success');
}

// ============================================================
// SUPABASE REST API (직접 fetch)
// ============================================================
async function apiGetRounds() {
  const res = await fetch(SB_URL + '/rounds?select=name,period,active&order=created_at', {headers: SB_HDR});
  if (!res.ok) throw new Error('서버 오류: ' + res.status);
  return res.json();
}

async function apiGetCheckins(round) {
  const res = await fetch(SB_URL + '/checkins?select=*&round=eq.' + encodeURIComponent(round), {headers: SB_HDR});
  if (!res.ok) throw new Error('서버 오류: ' + res.status);
  const data = await res.json();
  const result = {};
  data.forEach(r => { result[r.team] = { round: r.round, bunbu: r.bunbu, team: r.team, submittedAt: r.submitted_at, okrs: r.okrs }; });
  return result;
}

async function apiAddRound(name, period, active) {
  const res = await fetch(SB_URL + '/rounds', {
    method: 'POST', headers: SB_HDR,
    body: JSON.stringify({name, period: period || '', active})
  });
  if (res.status === 409) return { success: false, error: '동일한 이름의 회차가 이미 있습니다.' };
  if (!res.ok) throw new Error('추가 실패: ' + res.status);
  return { success: true };
}

async function apiToggleRound(name, active) {
  const res = await fetch(SB_URL + '/rounds?name=eq.' + encodeURIComponent(name), {
    method: 'PATCH', headers: SB_HDR,
    body: JSON.stringify({active})
  });
  if (!res.ok) throw new Error('변경 실패: ' + res.status);
}

async function apiDeleteRound(name) {
  const res = await fetch(SB_URL + '/rounds?name=eq.' + encodeURIComponent(name), {
    method: 'DELETE', headers: SB_HDR
  });
  if (!res.ok) throw new Error('삭제 실패: ' + res.status);
}

// ============================================================
// INIT
// ============================================================
async function init() {

  // 본부 셀렉트 초기화 (대시보드용)
  const bunbus = Object.keys(OKR_DATA);
  const db = document.getElementById('dashBunbu');
  db.innerHTML = '<option value="">전체 본부</option>';
  bunbus.forEach(b => {
    db.innerHTML += `<option value="${b}">${b}</option>`;
  });

  await loadRounds();
}

// ============================================================
// ROUNDS
// ============================================================
async function loadRounds() {
  try {
    showLoading(true);
    const rounds = await apiGetRounds();
    state.rounds = rounds || [];
    state.connected = true;
    setConnStatus(true);
    renderRoundList();
    renderDashRounds();
    renderDashboard();
  } catch(e) {
    state.connected = false;
    setConnStatus(false);
    showToast('연결 오류: ' + e.message, 'error');
  } finally { showLoading(false); }
}

function renderRoundList() {
  const list = document.getElementById('roundList');
  const rounds = state.rounds;
  if (!rounds.length) {
    list.innerHTML = '<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">생성된 회차가 없습니다.</div>';
    return;
  }
  let html = '';
  rounds.forEach((r) => {
    html += `
      <div class="round-item">
        <div class="r-info">
          <div class="r-name">${esc(r.name)}</div>
          ${r.period ? `<div class="r-period">📅 ${esc(r.period)}</div>` : ''}
        </div>
        <div class="round-actions">
          <button class="toggle-btn ${r.active ? 'on' : 'off'}" onclick="doToggleRound('${esc(r.name)}',${!r.active})">
            ${r.active ? '✅ 활성' : '⏸ 비활성'}
          </button>
          <button class="btn btn-danger btn-sm" onclick="doDeleteRound('${esc(r.name)}')">삭제</button>
        </div>
      </div>`;
  });
  list.innerHTML = html;
}

function renderDashRounds() {
  const sel = document.getElementById('dashRound');
  const prev = sel.value;
  sel.innerHTML = '<option value="">-- 회차 선택 --</option>';
  state.rounds.forEach(r => {
    sel.innerHTML += `<option value="${r.name}"${r.active ? ' selected' : ''}>${r.name}${r.active ? ' (활성)' : ''}</option>`;
  });
  if (prev) sel.value = prev;
  if (!sel.value && state.rounds.length) {
    const active = state.rounds.find(r => r.active);
    if (active) sel.value = active.name;
  }
  if (sel.value) refreshDashboard();
}

function setConnStatus(ok) {
  document.getElementById('connDot').className = 'conn-dot ' + (ok ? 'ok' : 'err');
  document.getElementById('connLabel').textContent = ok ? '연결됨' : '연결 안됨';
}

// ============================================================
// ADMIN ACTIONS
// ============================================================
async function doAddRound(active) {
  const name = document.getElementById('newName')?.value.trim();
  if (!name) { showToast('회차명을 입력해주세요.', 'error'); return; }
  const period = document.getElementById('newPeriod')?.value.trim() || '';
  showLoading(true);
  try {
    const res = await apiAddRound(name, period, active);
    if (!res.success) { showToast(res.error || '추가 실패', 'error'); return; }
    showToast(`"${name}" 회차가 추가되었습니다.`, 'success');
    document.getElementById('newName').value = '';
    document.getElementById('newPeriod').value = '';
    await loadRounds();
  } catch(e) { showToast('오류: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

async function doToggleRound(name, active) {
  showLoading(true);
  try {
    await apiToggleRound(name, active);
    await loadRounds();
  } catch(e) { showToast('오류: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

async function doDeleteRound(name) {
  if (!confirm(`"${name}" 회차를 삭제하겠습니까?\n(제출된 체크인 데이터는 유지됩니다)`)) return;
  showLoading(true);
  try {
    await apiDeleteRound(name);
    await loadRounds();
    showToast('회차가 삭제되었습니다.', '');
  } catch(e) { showToast('오류: ' + e.message, 'error'); }
  finally { showLoading(false); }
}

// ============================================================
// DASHBOARD
// ============================================================
async function refreshDashboard() {
  showLoading(true);
  try {
    const round = document.getElementById('dashRound').value;
    if (!round) { showLoading(false); return; }
    const data = await apiGetCheckins(round);
    state.checkins = data || {};
    renderDashboard();
  } catch(e) {
    showToast('새로고침 실패: ' + e.message, 'error');
  } finally { showLoading(false); }
}

function renderDashboard() {
  const round  = document.getElementById('dashRound').value;
  const filter = document.getElementById('dashBunbu').value;
  const data   = state.checkins;

  const allTeams = [];
  Object.entries(OKR_DATA).forEach(([b, teams]) => {
    if (filter && b !== filter) return;
    Object.keys(teams).forEach(t => allTeams.push({bunbu: b, team: t}));
  });

  const done   = allTeams.filter(t => data[t.team]).length;
  const issues = allTeams.filter(t => {
    const d = data[t.team]; return d && d.okrs.some(k => k.issue && k.issue !== '없음');
  }).length;

  document.getElementById('dTotal').textContent   = allTeams.length;
  document.getElementById('dDone').textContent    = done;
  document.getElementById('dPending').textContent = allTeams.length - done;
  document.getElementById('dIssue').textContent   = issues;

  const ic = {목표조정: 0, 신규목표: 0, 목표폐기: 0, 지원요청: 0, 기타: 0};
  allTeams.forEach(t => {
    const d = data[t.team]; if (!d) return;
    d.okrs.forEach(k => { if (k.issue && ic[k.issue] !== undefined) ic[k.issue]++; });
  });
  ['목표조정','신규목표','목표폐기','지원요청','기타'].forEach((k, i) => {
    document.getElementById('ic' + (i + 1)).textContent = ic[k];
  });

  const bunbuList = filter ? [filter] : Object.keys(OKR_DATA);
  const prog = document.getElementById('bunbuProgress');
  prog.innerHTML = '';
  bunbuList.forEach(b => {
    const teams = Object.keys(OKR_DATA[b]);
    const dc = teams.filter(t => data[t]).length;
    const pct = Math.round(dc / teams.length * 100);
    prog.innerHTML += `
      <div class="progress-row">
        <div class="progress-label">${b}</div>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-pct">${pct}%</div>
        <div style="font-size:12px;color:#64748b;min-width:40px">${dc}/${teams.length}</div>
      </div>`;
  });

  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  if (!allTeams.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>팀이 없습니다.</div></div>'; return;
  }
  allTeams.forEach(({bunbu, team}) => {
    const d = data[team];
    const iss = d ? d.okrs.filter(k => k.issue && k.issue !== '없음') : [];
    const tags = [...new Set(iss.map(k => k.issue))].map(v => `<span class="issue-tag tag-${v}">${v}</span>`).join('');
    grid.innerHTML += `
      <div class="team-card ${d ? 'done' : 'pending'}" onclick="showTeamDetail('${esc(bunbu)}','${esc(team)}')">
        <div class="team-card-name">${team}</div>
        <div class="team-card-bunbu">${bunbu}</div>
        <div class="team-card-status">
          <span class="sdot ${d ? 'g' : 'gr'}"></span>
          <span class="status-text">${d ? '✅ 완료' : '⏳ 미완료'}</span>
        </div>
        ${d ? `<div style="font-size:11px;color:#94a3b8;margin-top:4px">${d.submittedAt}</div>` : ''}
        ${tags ? `<div class="issue-tags">${tags}</div>` : ''}
      </div>`;
  });
}

// ============================================================
// TEAM DETAIL
// ============================================================
function showTeamDetail(bunbu, team) {
  const d    = state.checkins[team];
  const okrs = OKR_DATA[bunbu][team];
  document.getElementById('modalTitle').textContent = `${team} — ${document.getElementById('dashRound').value} 체크인 상세`;
  let html = '';
  if (!d) {
    html = '<div class="empty-state"><div class="empty-icon">📭</div><div>아직 체크인이 제출되지 않았습니다.</div></div>';
  } else {
    html = `<div class="notice ok">제출일시: ${d.submittedAt}</div>`;
    okrs.forEach((okr, i) => {
      const r = d.okrs[i] || {};
      const ib = r.issue && r.issue !== '없음' ? `<span class="issue-tag tag-${r.issue}">${r.issue}</span>` : '';
      html += `
        <div class="okr-dr">
          <div class="okr-dh"><span class="okr-num">OKR ${i + 1}</span><span class="badge ${okr.type === '정량' ? 'q' : 's'}">${okr.type}</span>${ib}</div>
          <div class="okr-obj">${esc(okr.goal)}</div>
          <div class="okr-kr">📌 ${esc(okr.kr)}</div>
          ${okr.detail ? `<div class="okr-krd">💬 ${esc(okr.detail)}</div>` : ''}
          <div class="okr-cg">
            <div class="di"><span>성과 체크인</span><div class="dv">${esc(r.checkin) || '-'}</div></div>
            <div class="di"><span>이슈</span><div class="dv">${esc(r.issue) || '-'}</div></div>
            ${r.comment ? `<div class="di" style="grid-column:span 2"><span>코멘트</span><div class="dv">${esc(r.comment)}</div></div>` : ''}
            ${r.issueText ? `<div class="di" style="grid-column:span 2"><span>상세 이슈</span><div class="dv">${esc(r.issueText)}</div></div>` : ''}
          </div>
        </div>`;
    });
  }
  document.getElementById('modalBody').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}

// ============================================================
// HELPERS
// ============================================================
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  btn.classList.add('active');
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + (type ? type : '') + ' show';
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ============================================================
// START
// ============================================================
if (sessionStorage.getItem(ADMIN_AUTH_KEY) === 'true') {
  document.getElementById('authOverlay').style.display = 'none';
  init();
} else {
  document.getElementById('authPwInput').focus();
}
</script>
